# Hadley Wickham on grammar of graphics

&gt; A grammar of graphics is a tool that enables us to concisely describe the components of a graphic. Such a grammar allows us to **move beyond named graphics** (e.g., the “scatterplot”) and gain insight into the **deep structure** that underlies statistical graphics.

---

# Hadley Wickham on grammar of graphics

between seemingly different graphics (Cox 1978).]

### Building up a plot: Layered presentation of graphics

&lt;blockquote class="twitter-tweet" data-lang="en"&gt;&lt;p lang="en" dir="ltr"&gt;My best tip on how to give better quantitative presentations is to (a) use more plots and (b) build up your plots on multiple overlays, as in:&lt;br&gt;&lt;br&gt;- Just x-axis (explain it)&lt;br&gt;- Add y-axis (explain it)&lt;br&gt;- Add 1 data point (explain it)&lt;br&gt;- Plot the rest of the data (explain it)&lt;/p&gt;&amp;mdash; Matt Blackwell (@matt_blackwell) &lt;a href="https://twitter.com/matt_blackwell/status/991004129198854145?ref_src=twsrc%5Etfw"&gt;April 30, 2018&lt;/a&gt;&lt;/blockquote&gt;
&lt;script async src="https://platform.twitter.com/widgets.js" charset="utf-8"&gt;&lt;/script&gt;




---

&gt; `+` [the plus sign] is the key to constructing sophisticated ggplot2 graphics. It allows you to start simple, then get more and more complex, checking your work at each step.

``` r
ggplot() +
  aes(x = 1) +
  aes(y = n) +
  geom_col(width = 2, col = "grey", ) + 
  aes(fill = continent) +
  geom_point(aes(y = text_pos_y, x = 2.3), 
             color = "pink") +
  aes(label = continent) +
  geom_text(aes(y = text_pos_y, x = 2.3), 
            color = "navy") +
  geom_vline(xintercept = 0:2, lty = "dashed") +
  scale_x_continuous(limits = c(-1, 3)) +
  coord_polar(theta = "y")
```

One rather savvy and experienced R described his experience with ggplot2:  “All good ggplots start like all good makefiles, by copying the last one you edited and deleting most of it.”

"Hacker News" exchange about ggplot2: 	
	
sk5t 8 months ago [-]

*I can't help but wonder--as someone who has flirted with R but certainly not committed--how much time and practice it takes to acquire decent fluency with these half-magical incantations to become productive.*

---

jhbadger 8 months ago [-]

*Not that long. The trick is to really understand what each clause is doing. It's easy to just find some code on the Web for a graph similar to what you want and tweak it for your data, and I did that myself in the beginning, but then they will remain "half-magical incantations" as you put it. The thing about ggplot is nothing is there arbitrarily -- it is really describing how the plot is put together.*
